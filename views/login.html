<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Panel - Giris</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">📺</div>
      <h1>IPTV Panel</h1>
      <p class="subtitle">Yonetim paneline giris yapin</p>

      <div id="loginError" style="display:none;background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#ef4444;padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px;text-align:center;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>Kullanici Adi</label>
          <input type="text" id="username" placeholder="admin" required>
        </div>
        <div class="form-group">
          <label>Sifre</label>
          <input type="password" id="password" placeholder="admin123" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-full" id="loginBtn">
          Giris Yap
        </button>
      </form>

      <div class="text-center mt-4">
        <a href="/register" class="link-text">Hesabiniz yok mu? Kayit olun</a>
      </div>

      <div id="debugInfo" style="margin-top:20px;padding:10px;background:rgba(255,255,255,0.05);border-radius:8px;font-size:11px;color:#666;display:none;"></div>
    </div>
  </div>

  <script>
    console.log('Login sayfasi yuklendi');

    var loginForm = document.getElementById('loginForm');
    var loginBtn = document.getElementById('loginBtn');
    var errorDiv = document.getElementById('loginError');
    var debugDiv = document.getElementById('debugInfo');

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }

    function hideError() {
      errorDiv.style.display = 'none';
    }

    function showDebug(msg) {
      debugDiv.style.display = 'block';
      debugDiv.innerHTML += msg + '<br>';
    }

    // Sayfa yuklenince token kontrol
    (function checkExistingLogin() {
      var token = getCookie('token');
      if (token) {
        showDebug('Mevcut token bulundu, kontrol ediliyor...');
        fetch('/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.user) {
            showDebug('Oturum gecerli: ' + data.user.username + ' (' + data.user.role + ')');
            if (data.user.role === 'admin') {
              window.location.href = '/admin';
            } else {
              window.location.href = '/dashboard';
            }
          }
        })
        .catch(function() {
          showDebug('Token gecersiz');
        });
      }
    })();

    function getCookie(name) {
      var cookies = document.cookie.split(';');
      for (var i = 0; i < cookies.length; i++) {
        var c = cookies[i].trim();
        if (c.startsWith(name + '=')) {
          return c.substring(name.length + 1);
        }
      }
      return null;
    }

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      hideError();

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value.trim();

      if (!username || !password) {
        showError('Kullanici adi ve sifre girin');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Giris yapiliyor...';
      showDebug('Login istegi gonderiliyor: ' + username);

      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/auth/login', true);
      xhr.setRequestHeader('Content-Type', 'application/json');

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          showDebug('Yanit kodu: ' + xhr.status);
          showDebug('Yanit: ' + xhr.responseText.substring(0, 200));

          loginBtn.disabled = false;
          loginBtn.textContent = 'Giris Yap';

          try {
            var data = JSON.parse(xhr.responseText);

            if (xhr.status === 200 && data.success) {
              showDebug('Giris basarili! Rol: ' + data.user.role);

              // Token'i cookie'ye manuel kaydet
              document.cookie = 'token=' + data.token + '; path=/; max-age=' + (7*24*60*60);

              // Yonlendirme
              if (data.user.role === 'admin') {
                showDebug('Admin paneline yonlendiriliyor...');
                window.location.href = '/admin';
              } else {
                showDebug('Kullanici paneline yonlendiriliyor...');
                window.location.href = '/dashboard';
              }
            } else {
              showError(data.error || 'Giris basarisiz');
            }
          } catch (parseErr) {
            showDebug('JSON parse hatasi: ' + parseErr.message);
            showError('Sunucu yaniti okunamadi');
          }
        }
      };

      xhr.onerror = function() {
        showDebug('Baglanti hatasi!');
        showError('Sunucuya baglanilamadi');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Giris Yap';
      };

      xhr.send(JSON.stringify({
        username: username,
        password: password
      }));
    });
  </script>
</body>
</html>
