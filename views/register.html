<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Panel - Kayit</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">📺</div>
      <h1>Kayit Ol</h1>
      <p class="subtitle">Yeni hesap olusturun</p>

      <div id="regMsg" style="display:none;padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px;text-align:center;"></div>

      <form id="registerForm">
        <div class="form-group">
          <label>Kullanici Adi (en az 3 karakter)</label>
          <input type="text" id="username" required minlength="3">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label>Sifre (en az 6 karakter)</label>
          <input type="password" id="password" required minlength="6">
        </div>
        <div class="form-group">
          <label>Sifre Tekrar</label>
          <input type="password" id="password2" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-full" id="regBtn">Kayit Ol</button>
      </form>

      <div class="text-center mt-4">
        <a href="/" class="link-text">Giris sayfasina don</a>
      </div>
    </div>
  </div>

  <script>
    var regForm = document.getElementById('registerForm');
    var msgDiv = document.getElementById('regMsg');
    var regBtn = document.getElementById('regBtn');

    function showMsg(text, isError) {
      msgDiv.style.display = 'block';
      msgDiv.textContent = text;
      if (isError) {
        msgDiv.style.background = 'rgba(239,68,68,0.1)';
        msgDiv.style.border = '1px solid #ef4444';
        msgDiv.style.color = '#ef4444';
      } else {
        msgDiv.style.background = 'rgba(34,197,94,0.1)';
        msgDiv.style.border = '1px solid #22c55e';
        msgDiv.style.color = '#22c55e';
      }
    }

    regForm.addEventListener('submit', function(e) {
      e.preventDefault();
      msgDiv.style.display = 'none';

      var password = document.getElementById('password').value;
      var password2 = document.getElementById('password2').value;

      if (password !== password2) {
        showMsg('Sifreler eslesmiyor!', true);
        return;
      }

      regBtn.disabled = true;
      regBtn.textContent = 'Kayit yapiliyor...';

      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/auth/register', true);
      xhr.setRequestHeader('Content-Type', 'application/json');

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          regBtn.disabled = false;
          regBtn.textContent = 'Kayit Ol';

          try {
            var data = JSON.parse(xhr.responseText);
            if (data.success) {
              showMsg('Kayit basarili! Giris sayfasina yonlendiriliyorsunuz...', false);
              setTimeout(function() { window.location.href = '/'; }, 2000);
            } else {
              showMsg(data.error || 'Kayit basarisiz', true);
            }
          } catch (err) {
            showMsg('Sunucu hatasi', true);
          }
        }
      };

      xhr.send(JSON.stringify({
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: password
      }));
    });
  </script>
</body>
</html>
