<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>IPTV Yönetim Paneli (Admin)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-400">IPTV Admin Kontrol Paneli</h1>
            <button onclick="localStorage.clear(); window.location.href='/login.html'" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded">Çıkış Yap</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Manuel Kanal Ekleme -->
            <div class="bg-slate-800 p-6 rounded-lg">
                <h2 class="text-xl font-bold mb-4 text-emerald-400">Tekil Kanal Ekle</h2>
                <form id="channelForm" class="space-y-3">
                    <input type="text" id="chName" placeholder="Kanal Adı" class="w-full p-2 bg-slate-700 rounded border border-slate-600" required>
                    <input type="text" id="chCategory" placeholder="Kategori (örn: Spor, Sinema)" class="w-full p-2 bg-slate-700 rounded border border-slate-600" required>
                    <input type="text" id="chUrl" placeholder="Yayın URL'si (m3u8)" class="w-full p-2 bg-slate-700 rounded border border-slate-600" required>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 p-2 rounded font-semibold">Kanalı Kaydet</button>
                </form>
            </div>

            <!-- M3U Toplu Import -->
            <div class="bg-slate-800 p-6 rounded-lg md:col-span-2">
                <h2 class="text-xl font-bold mb-4 text-indigo-400">Toplu M3U Yükle (.m3u metnini yapıştırın)</h2>
                <textarea id="m3uContent" rows="4" placeholder="#EXTM3U&#10;#EXTINF:-1 group-title=&quot;Belgesel&quot;,Discovery&#10;http://ornek.com/stream.m3u8" class="w-full p-2 bg-slate-700 rounded border border-slate-600 text-xs font-mono"></textarea>
                <button onclick="importM3U()" class="mt-2 w-full bg-indigo-600 hover:bg-indigo-700 p-2 rounded font-semibold">M3U İçeriğini Çöz ve Ekle</button>
            </div>
        </div>

        <!-- Kanal Listesi -->
        <div class="mt-10 bg-slate-800 p-6 rounded-lg">
            <h2 class="text-xl font-bold mb-4">Sistemdeki Tüm Kanallar</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400">
                            <th class="p-3">Kanal Adı</th>
                            <th class="p-3">Kategori</th>
                            <th class="p-3">Yayın Linki</th>
                            <th class="p-3">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="channelTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        if(localStorage.getItem('role') !== 'admin') window.location.href = '/login.html';

        async function loadChannels() {
            const res = await fetch('/api/admin/channels');
            const channels = await res.json();
            const tbody = document.getElementById('channelTableBody');
            tbody.innerHTML = '';
            
            channels.forEach(ch => {
                tbody.innerHTML += `
                    <tr class="border-b border-slate-700 hover:bg-slate-750">
                        <td class="p-3">${ch.name}</td>
                        <td class="p-3"><span class="bg-slate-700 px-2 py-1 rounded text-xs">${ch.category}</span></td>
                        <td class="p-3 text-xs text-slate-400 truncate max-w-xs">${ch.url}</td>
                        <td class="p-3">
                            <button onclick="deleteChannel('${ch.id}')" class="bg-red-500 hover:bg-red-600 px-2 py-1 rounded text-xs">Sil</button>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('channelForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('chName').value;
            const category = document.getElementById('chCategory').value;
            const url = document.getElementById('chUrl').value;

            await fetch('/api/admin/channels', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, category, url })
            });
            document.getElementById('channelForm').reset();
            loadChannels();
        });

        async function deleteChannel(id) {
            if(confirm('Kanalı silmek istediğinize emin misiniz?')) {
                await fetch(`/api/admin/channels/${id}`, { method: 'DELETE' });
                loadChannels();
            }
        }

        async function importM3U() {
            const m3uContent = document.getElementById('m3uContent').value;
            const res = await fetch('/api/admin/import-m3u', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ m3uContent })
            });
            const data = await res.json();
            if(data.success) {
                alert(`${data.count} kanal başarıyla sisteme entegre edildi!`);
                document.getElementById('m3uContent').value = '';
                loadChannels();
            }
        }

        loadChannels();
    </script>
</body>
</html>
