<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin IPTV Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-red-500">IPTV Yönetim Paneli (Admin)</h1>
            <button onclick="fetch('/api/logout').then(()=>window.location.href='/login.html')" class="bg-gray-700 px-4 py-2 rounded hover:bg-gray-600">Çıkış</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <!-- Manuel Kanal Ekleme -->
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-xl font-bold mb-4 text-blue-400">Tekil Kanal Ekle</h2>
                <input type="text" id="name" placeholder="Kanal Adı" class="w-full p-2 mb-3 bg-gray-700 rounded border border-gray-600">
                <input type="text" id="url" placeholder="Yayın URL (Stream Link)" class="w-full p-2 mb-3 bg-gray-700 rounded border border-gray-600">
                <input type="text" id="category" placeholder="Kategori (Örn: Spor, Sinema)" class="w-full p-2 mb-4 bg-gray-700 rounded border border-gray-600">
                <button onclick="addChannel()" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700 w-full font-bold">Kanalı Kaydet</button>
            </div>

            <!-- M3U Yükleme Alanı -->
            <div class="bg-gray-800 p-6 rounded-lg">
                <h2 class="text-xl font-bold mb-4 text-green-400">Toplu M3U Yükle (Import)</h2>
                <textarea id="m3uContent" rows="5" placeholder="#EXTM3U&#10;#EXTINF:-1 group-title=&quot;Belgesel&quot;,Discovery&#10;http://stream-link..." class="w-full p-2 mb-4 bg-gray-700 rounded border border-gray-600 text-xs font-mono"></textarea>
                <button onclick="importM3u()" class="bg-green-600 px-4 py-2 rounded hover:bg-green-700 w-full font-bold">M3U Çözümle ve Ekle</button>
            </div>
        </div>

        <!-- Kanal Listesi -->
        <div class="bg-gray-800 p-6 rounded-lg">
            <h2 class="text-xl font-bold mb-4">Sistemdeki Tüm Kanallar</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-700 text-gray-400">
                            <th class="p-2">Kanal Adı</th>
                            <th class="p-2">Kategori</th>
                            <th class="p-2">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="channelList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadChannels() {
            const res = await fetch('/api/admin/channels');
            const data = await res.json();
            const tbody = document.getElementById('channelList');
            tbody.innerHTML = '';
            data.forEach(c => {
                tbody.innerHTML += `
                    <tr class="border-b border-gray-700 text-sm">
                        <td class="p-2 font-semibold">${c.name}</td>
                        <td class="p-2 text-gray-400"><span class="bg-gray-700 px-2 py-1 rounded text-xs">${c.category}</span></td>
                        <td class="p-2"><button onclick="deleteChannel('${c.id}')" class="text-red-500 hover:underline">Sil</button></td>
                    </tr>`;
            });
        }

        async function addChannel() {
            await fetch('/api/admin/channels', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: d('name'), url: d('url'), category: d('category')})
            });
            loadChannels();
        }

        async function importM3u() {
            const res = await fetch('/api/admin/import-m3u', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({m3uContent: d('m3uContent')})
            });
            const data = await res.json();
            alert(`${data.count} kanal başarıyla sisteme işlendi.`);
            loadChannels();
        }

        async function deleteChannel(id) {
            if(confirm('Kanalı silmek istediğinize emin misiniz?')) {
                await fetch(`/api/admin/channels/${id}`, {method: 'DELETE'});
                loadChannels();
            }
        }

        const d = (id) => document.getElementById(id).value;
        loadChannels();
    </script>
</body>
</html>
