<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>IPTV Panel Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-500">IPTV Portal</h2>
        <div class="mb-4">
            <label class="block text-sm mb-2">Kullanıcı Adı</label>
            <input type="text" id="username" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
        </div>
        <div class="mb-6">
            <label class="block text-sm mb-2">Şifre</label>
            <input type="password" id="password" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
        </div>
        <button onclick="login()" class="w-full bg-blue-600 p-2 rounded font-semibold hover:bg-blue-700 transition mb-3">Giriş Yap</button>
        <button onclick="register()" class="w-full bg-gray-600 p-2 rounded font-semibold hover:bg-gray-500 transition text-sm">Yeni Hesap Oluştur</button>
    </div>

    <script>
        async function login() {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: b('username'), password: b('password')})
            });
            const data = await res.json();
            if(data.success) window.location.href = data.isAdmin ? '/admin.html' : '/user.html';
            else alert(data.error);
        }
        async function register() {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: b('username'), password: b('password')})
            });
            const data = await res.json();
            alert(data.message || data.error);
        }
        const b = (id) => document.getElementById(id).value;
    </script>
</body>
</html>
