<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - IPTV Panel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo-area">📡</div>
            <h1>Giriş Yap</h1>
            <p class="subtitle">Hesabınıza giriş yapın</p>
            
            <div id="alert" style="display:none"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" class="form-control" id="username" placeholder="Kullanıcı adınız" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" class="form-control" id="password" placeholder="Şifreniz" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">🔑 Giriş Yap</button>
            </form>
            
            <div class="auth-links">
                Hesabınız yok mu? <a href="/register">Üye Ol</a>
                <br><br>
                <a href="/admin">👑 Admin Girişi</a> · <a href="/">🏠 Ana Sayfa</a>
            </div>
        </div>
    </div>

    <script>
        // Oturum kontrolü
        fetch('/api/session').then(r => r.json()).then(data => {
            if (data.loggedIn && !data.isAdmin) window.location.href = '/dashboard';
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertDiv = document.getElementById('alert');
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alertDiv.className = 'alert alert-success';
                    alertDiv.textContent = '✅ Giriş başarılı! Yönlendiriliyorsunuz...';
                    alertDiv.style.display = 'flex';
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    alertDiv.className = 'alert alert-error';
                    alertDiv.textContent = '❌ ' + data.error;
                    alertDiv.style.display = 'flex';
                }
            } catch (err) {
                alertDiv.className = 'alert alert-error';
                alertDiv.textContent = '❌ Bağlantı hatası';
                alertDiv.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
