name: Update M3U Playlist

on:
  # Her 4 saatte bir çalışsın (tokenlar süreli olduğu için)
  schedule:
    - cron: '0 */4 * * *'

  # Manuel tetikleme
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug mode (verbose logging)'
        required: false
        default: 'false'
        type: boolean

  # Push olduğunda da çalışsın
  push:
    branches:
      - main
    paths:
      - 'scraper.py'
      - 'channels.txt'
      - '.github/workflows/update_m3u.yml'

# Aynı anda birden fazla çalışmasını engelle
concurrency:
  group: update-m3u
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── Checkout ───
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ─── Python Setup ───
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── Sistem bağımlılıkları ───
      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libdbus-1-3 \
            libxkbcommon0 \
            libatspi2.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libx11-xcb1 \
            fonts-liberation \
            xvfb

      # ─── Python bağımlılıkları ───
      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      # ─── Scraper'ı çalıştır ───
      - name: 🔍 Run stream finder
        id: scraper
        run: |
          echo "Starting stream finder..."
          python scraper.py 2>&1 | tee scraper_output.log
          
          # M3U dosyasını kontrol et
          if [ -f "tv247.m3u" ]; then
            echo "✅ M3U dosyası oluşturuldu"
            echo "m3u_created=true" >> $GITHUB_OUTPUT
            cat tv247.m3u
          else
            echo "❌ M3U dosyası oluşturulamadı"
            echo "m3u_created=false" >> $GITHUB_OUTPUT
          fi
        env:
          PYTHONUNBUFFERED: "1"

      # ─── M3U doğrulama ───
      - name: ✅ Validate M3U file
        if: steps.scraper.outputs.m3u_created == 'true'
        run: |
          echo "M3U dosyası doğrulanıyor..."
          
          # En az 1 kanal olmalı
          CHANNEL_COUNT=$(grep -c "^#EXTINF" tv247.m3u || echo "0")
          URL_COUNT=$(grep -c "^http" tv247.m3u || echo "0")
          
          echo "Kanal sayısı: $CHANNEL_COUNT"
          echo "URL sayısı: $URL_COUNT"
          
          if [ "$CHANNEL_COUNT" -eq "0" ]; then
            echo "⚠️ Hiç kanal bulunamadı!"
            # Önceki başarılı dosyayı koru
            if git show HEAD:tv247.m3u > /dev/null 2>&1; then
              echo "Önceki M3U dosyası korunuyor"
              git checkout HEAD -- tv247.m3u
            fi
          fi

      # ─── Sonuçları commit ve push et ───
      - name: 📤 Commit and push changes
        if: steps.scraper.outputs.m3u_created == 'true'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Değişiklik var mı kontrol et
          if git diff --quiet tv247.m3u 2>/dev/null; then
            echo "ℹ️ M3U dosyasında değişiklik yok"
          else
            git add tv247.m3u
            
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            CHANNEL_COUNT=$(grep -c "^#EXTINF" tv247.m3u || echo "0")
            
            git commit -m "🔄 Update M3U playlist - ${TIMESTAMP} (${CHANNEL_COUNT} channels)"
            git push
            
            echo "✅ Değişiklikler push edildi"
          fi

      # ─── Hata durumunda log ───
      - name: 📋 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: |
            scraper_output.log
            tv247.m3u
          retention-days: 7

      # ─── Sonuç özeti ───
      - name: 📊 Summary
        if: always()
        run: |
          echo "## 📺 TV247 M3U Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "tv247.m3u" ]; then
            CHANNEL_COUNT=$(grep -c "^#EXTINF" tv247.m3u || echo "0")
            echo "- ✅ **Status:** Success" >> $GITHUB_STEP_SUMMARY
            echo "- 📺 **Channels found:** ${CHANNEL_COUNT}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### M3U Content" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat tv247.m3u >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Status:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ **Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
